services:
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/storage/snapshots
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      RAG_API_KEY: ${RAG_API_KEY}
      RAG_BASE_URL: ${RAG_BASE_URL:-https://api.aipaibox.com}
    volumes:
      - ./data:/app/data:ro
      - ./embeddings:/app/embeddings:ro
      - ./evaluation:/app/evaluation:ro
      - ./results:/app/results:ro
    depends_on:
      qdrant:
        condition: service_healthy
    command: python scripts/app.py --mode api
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_ui
    ports:
      - "8501:8501"
    environment:
      RAG_API_KEY: ${RAG_API_KEY}
      RAG_BASE_URL: ${RAG_BASE_URL:-https://api.aipaibox.com}
    volumes:
      - ./data:/app/data:ro
      - ./embeddings:/app/embeddings:ro
      - ./evaluation:/app/evaluation:ro
      - ./results:/app/results:ro
    depends_on:
      - api
    command: python scripts/app.py --mode ui
    restart: unless-stopped
